<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyCsEuzMMJcD6is3kwB0qkmWV09EJpRvBew",
    authDomain: "paper-2-2920a.firebaseapp.com",
    projectId: "paper-2-2920a",
    storageBucket: "paper-2-2920a.firebasestorage.app",
    messagingSenderId: "855154235865",
    appId: "1:855154235865:web:630fc043d850af18eca1c8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window._fbAuth = auth;

  console.log("Firebase Auth Loaded:", auth);

  // --- ADD THIS OBSERVER START ---
  const { onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js");
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      console.log("👤 User detected:", user.email);
      await onUserLoggedIn({
        uid: user.uid,
        displayName: user.displayName || user.email?.split('@')[0] || 'User',
        email: user.email,
        isAnon: user.isAnonymous
      });
    } else {
      console.log("👋 No user signed in.");
      document.getElementById('appRoot').style.display = 'none';
      document.getElementById('authScreen').style.display = 'flex';
    }
  });
  // --- ADD THIS OBSERVER END --- // <-- IMPORTANT
</script>


<style>
:root {
  --bg:#0d0f14; --surface:#151820; --surface2:#1c2030; --border:#252a3a;
  --accent:#c0392b; --accent2:#e74c3c; --gold:#f39c12;
  --correct:#1db96a; --wrong:#e74c3c; --text:#e8eaf0; --muted:#6b7492; --tag:#1e2535;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* ── AUTH SCREEN ── */
#authScreen{
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:24px;
  background: radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(243,156,18,0.05) 0%, transparent 50%),
              var(--bg);
}
.auth-card{
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:40px 36px; width:100%; max-width:400px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}
.auth-logo{
  font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem;
  letter-spacing:0.04em; margin-bottom:6px;
}
.auth-logo span{color:var(--accent2);}
.auth-subtitle{font-size:0.82rem;color:var(--muted);margin-bottom:32px;}
.auth-tabs{display:flex;gap:0;margin-bottom:28px;background:var(--surface2);border-radius:10px;padding:4px;}
.auth-tab{
  flex:1; background:none; border:none; border-radius:7px; padding:8px;
  color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.84rem;
  cursor:pointer; transition:all 0.15s;
}
.auth-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,0.3);}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:0.75rem;color:var(--muted);margin-bottom:6px;letter-spacing:0.05em;text-transform:uppercase;}
.auth-input{
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:9px; padding:11px 14px; color:var(--text);
  font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none;
  transition:border-color 0.15s;
}
.auth-input:focus{border-color:var(--accent2);}
.auth-input::placeholder{color:var(--muted);}
.auth-btn{
  width:100%; padding:12px; border-radius:10px; border:none;
  font-family:'DM Sans',sans-serif; font-size:0.92rem; font-weight:500;
  cursor:pointer; transition:all 0.15s; margin-bottom:10px;
}
.auth-btn.primary{background:var(--accent);color:#fff;}
.auth-btn.primary:hover{background:var(--accent2);}
.auth-btn.google{
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.auth-btn.google:hover{background:var(--border);}
.auth-btn.anon{background:none;border:1px solid var(--border);color:var(--muted);font-size:0.82rem;padding:10px;}
.auth-btn.anon:hover{color:var(--text);border-color:var(--muted);}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:0.78rem;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.auth-error{
  background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.25);
  border-radius:8px; padding:10px 14px; font-size:0.82rem; color:var(--wrong);
  margin-bottom:14px; display:none;
}
.auth-error.show{display:block;}
.auth-loading{opacity:0.6;pointer-events:none;}

/* Google SVG icon */
.google-icon{width:18px;height:18px;flex-shrink:0;}

/* ── HEADER ── */
.header{
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:12px 24px; display:flex; align-items:center;
  justify-content:space-between; flex-shrink:0; gap:12px;
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:0.03em;white-space:nowrap;}
.logo span{color:var(--accent2);}
.header-right{display:flex;align-items:center;gap:10px;}
.header-nav{display:flex;gap:6px;}
.nav-tab{
  background:none; border:1px solid var(--border); border-radius:8px;
  padding:7px 16px; color:var(--muted); font-family:'DM Sans',sans-serif;
  font-size:0.82rem; cursor:pointer; transition:all 0.15s;
}
.nav-tab:hover{background:var(--surface2);color:var(--text);}
.nav-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.user-pill{
  display:flex; align-items:center; gap:8px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:20px; padding:5px 12px 5px 6px; font-size:0.8rem;
}
.user-avatar{
  width:24px;height:24px;border-radius:50%;
  background:var(--accent);display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:700;color:#fff;flex-shrink:0;
}
.user-name{color:var(--text);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sign-out-btn{
  background:none;border:none;color:var(--muted);font-size:0.75rem;
  cursor:pointer;padding:4px 8px;border-radius:6px;transition:all 0.15s;
}
.sign-out-btn:hover{color:var(--wrong);}

/* ── SHELL ── */
.shell{display:flex;flex:1;overflow:hidden;height:calc(100vh - 57px);}

/* ── SIDEBAR ── */
.sidebar{
  width:230px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);overflow-y:auto;padding:12px 0;
}
.sidebar-title{
  font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:700;
  letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:6px 16px 10px;
}
.topic-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:8px 16px;background:none;border:none;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;
  text-align:left;transition:background 0.12s;gap:8px;
}
.topic-btn:hover{background:var(--surface2);}
.topic-btn.active{background:var(--surface2);border-left:3px solid var(--accent2);padding-left:13px;}
.topic-count{font-size:0.7rem;background:var(--tag);border-radius:10px;padding:2px 7px;color:var(--muted);flex-shrink:0;}
.topic-btn.active .topic-count{background:var(--accent);color:#fff;}
.topic-progress{height:2px;background:var(--border);margin:0 16px 2px;border-radius:2px;overflow:hidden;}
.topic-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* ── QUIZ VIEW ── */
#quizView{flex:1;display:flex;flex-direction:column;padding:28px 36px;max-width:760px;margin:0 auto;width:100%;}
.q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.q-topic-tag{
  font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--accent2);background:rgba(231,76,60,0.1);border-radius:6px;padding:4px 10px;
}
.q-counter{font-size:0.8rem;color:var(--muted);}
.q-counter b{color:var(--text);}
.qprogress{height:3px;background:var(--surface2);border-radius:2px;margin-bottom:28px;overflow:hidden;}
.qprogress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;transition:width 0.4s ease;}
.q-text{font-size:1.08rem;font-weight:500;line-height:1.65;color:var(--text);margin-bottom:26px;min-height:60px;}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.option{
  display:flex;align-items:flex-start;gap:12px;padding:13px 16px;
  border-radius:10px;border:1.5px solid var(--border);cursor:pointer;
  transition:all 0.15s;background:var(--surface);font-size:0.9rem;line-height:1.5;user-select:none;
}
.option:hover:not(.locked){border-color:#404868;background:var(--surface2);}
.option.correct{border-color:var(--correct)!important;background:rgba(29,185,106,0.1)!important;}
.option.wrong{border-color:var(--wrong)!important;background:rgba(231,76,60,0.1)!important;}
.option.dimmed{opacity:0.4;}
.option.locked{cursor:default;}
.opt-letter{
  font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;
  color:var(--muted);flex-shrink:0;width:20px;margin-top:2px;
}
.option.correct .opt-letter{color:var(--correct);}
.option.wrong .opt-letter{color:var(--wrong);}
.feedback{
  display:none;align-items:center;gap:10px;padding:12px 16px;
  border-radius:10px;font-size:0.88rem;font-weight:500;margin-bottom:22px;
  animation:fadeIn 0.2s ease;
}
.feedback.show{display:flex;}
.feedback.correct-fb{background:rgba(29,185,106,0.12);color:var(--correct);border:1px solid rgba(29,185,106,0.25);}
.feedback.wrong-fb{background:rgba(231,76,60,0.1);color:var(--wrong);border:1px solid rgba(231,76,60,0.2);}
.feedback.reveal-fb{background:rgba(243,156,18,0.1);color:var(--gold);border:1px solid rgba(243,156,18,0.2);}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.actions{display:flex;gap:10px;align-items:center;}
.btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:9px;
  padding:10px 20px;color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:0.86rem;cursor:pointer;transition:all 0.15s;
}
.btn:hover{background:var(--border);}
.btn:disabled{opacity:0.3;cursor:default;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}
.btn.primary:hover{background:var(--accent2);}
.btn.ghost{background:none;color:var(--muted);font-size:0.8rem;padding:10px 12px;}
.btn.ghost:hover{color:var(--text);background:none;}
.spacer{flex:1;}
.jump-wrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.jump-input{
  width:58px;background:var(--surface2);border:1px solid var(--border);
  border-radius:7px;padding:7px 9px;color:var(--text);font-size:0.82rem;
  font-family:'DM Sans',sans-serif;text-align:center;outline:none;
}
.jump-input:focus{border-color:var(--accent2);}
.jump-label{font-size:0.78rem;color:var(--muted);}

/* ── STATS VIEW ── */
#statsView{display:none;padding:28px 36px;max-width:900px;margin:0 auto;width:100%;}
#statsView.active{display:block;}
.stats-heading{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:24px;}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 18px;text-align:center;}
.stat-card .val{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;line-height:1;margin-bottom:6px;}
.stat-card .lbl{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;}
.stat-card.c1 .val{color:var(--text);}
.stat-card.c2 .val{color:var(--correct);}
.stat-card.c3 .val{color:var(--wrong);}
.stat-card.c4 .val{color:var(--gold);}
.stat-card.c5 .val{color:#7c83ff;}
.score-ring-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;
}
.score-ring-wrap h3{font-family:'Syne',sans-serif;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
.ring-svg{width:140px;height:140px;}
.topic-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:28px;}
.topic-table-wrap h3{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:16px 20px 14px;border-bottom:1px solid var(--border);}
.topic-row{display:grid;grid-template-columns:1fr 60px 60px 60px 80px 120px;gap:8px;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);font-size:0.84rem;}
.topic-row:last-child{border-bottom:none;}
.topic-row.head{font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.07em;background:var(--surface2);}
.bar-cell{display:flex;align-items:center;gap:8px;}
.mini-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:3px;}
.pct-val{font-size:0.78rem;color:var(--muted);white-space:nowrap;}
.badge-correct{color:var(--correct);font-weight:600;}
.badge-wrong{color:var(--wrong);font-weight:600;}
.activity-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.activity-list h3{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:16px 20px 14px;border-bottom:1px solid var(--border);}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:11px 20px;border-bottom:1px solid var(--border);font-size:0.83rem;}
.activity-item:last-child{border-bottom:none;}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.act-dot.c{background:var(--correct);}
.act-dot.w{background:var(--wrong);}
.act-q{flex:1;color:var(--text);line-height:1.4;}
.act-sec{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.act-result{font-size:0.78rem;font-weight:600;flex-shrink:0;}

/* Save indicator */
.save-dot{
  width:7px;height:7px;border-radius:50%;background:var(--muted);
  display:inline-block;margin-left:6px;transition:background 0.3s;
}
.save-dot.saving{background:var(--gold);animation:pulse 0.8s infinite;}
.save-dot.saved{background:var(--correct);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── MOBILE RESPONSIVENESS ── */
@media(max-width: 768px) {
    /* Stack the header elements */
    .header { padding: 10px; gap: 8px; flex-wrap: wrap; }
    .logo { font-size: 0.9rem; }
    .header-right { width: 100%; justify-content: space-between; order: 2; }

    /* The Sidebar Drawer */
    .sidebar {
        position: fixed;
        left: -230px; /* Hide off-screen */
        top: 0;
        bottom: 0;
        z-index: 1000;
        transition: left 0.3s ease;
        box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }
    .sidebar.open { left: 0; }

    /* Overlay when sidebar is open */
    .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        z-index: 999;
    }
    .sidebar-overlay.show { display: block; }

    /* Quiz Adjustments */
    #quizView { padding: 15px; }
    .q-text { font-size: 1rem; }
    .option { padding: 10px; font-size: 0.85rem; }
    .actions { flex-wrap: wrap; gap: 15px; }
    .jump-wrap { width: 100%; justify-content: center; order: 3; }

    /* Stats Table: Hide less important columns */
    .topic-row { 
        grid-template-columns: 1fr 50px 80px; /* Topic, Tot, Progress */
    }
    .topic-row span:nth-child(3), 
    .topic-row span:nth-child(4), 
    .topic-row span:nth-child(5) { display: none; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     AUTH SCREEN
═══════════════════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">ADRENALINE <span>OBG</span></div>
    <div class="auth-subtitle">Paper 2 Question Bank — Sign in to save your progress</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignIn" onclick="authTab('signin')">Sign In</button>
      <button class="auth-tab" id="tabSignUp" onclick="authTab('signup')">Sign Up</button>
    </div>

    <div id="authError" class="auth-error"></div>

    <div class="auth-field">
      <label>Email</label>
      <input class="auth-input" id="authEmail" type="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input class="auth-input" id="authPassword" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="auth-btn primary" id="btnEmailAuth" onclick="handleEmailAuth()">Sign In</button>

    <div class="auth-divider">or</div>

    <button class="auth-btn google" onclick="handleGoogleAuth()">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider">or</div>

    <button class="auth-btn anon" onclick="handleAnonymousAuth()">
      Continue as Guest (progress not saved)
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     MAIN APP (hidden until auth)
═══════════════════════════════════════════════ -->
<div id="appRoot" style="display:none;flex-direction:column;flex:1;">

  <div class="header">
    <div class="logo">ADRENALINE <span>OBG</span> — Paper 2</div>
    <div class="header-right">
      <div class="header-nav">
        <button class="nav-tab active" id="tabQuiz" onclick="switchTab('quiz')">Quiz</button>
        <button class="nav-tab" id="tabStats" onclick="switchTab('stats')">Stats</button>

// Replace these two functions to persist progress to Firestore.

// ════════════════════════════════════════════════════════════════════

async function saveProgressToFirebase(uid, data) {
  if (!uid) return;
  const { getFirestore, doc, setDoc } = await import("https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js");
  const db = getFirestore();
  try {
    await setDoc(doc(db, 'users', uid), data, { merge: true });
    console.log("💾 Progress saved to Firebase");
  } catch (e) {
    console.error("Firestore Save Error:", e);
  }
}

async function loadProgressFromFirebase(uid) {
  if (!uid) return null;
  const { getFirestore, doc, getDoc } = await import("https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js");
  const db = getFirestore();
  try {
    const snap = await getDoc(doc(db, 'users', uid));
    return snap.exists() ? snap.data() : null;
  } catch (e) {
    console.error("Firestore Load Error:", e);
    return null;
  }
}

const SECTIONS = [...new Set(ALL_QUESTIONS.map(q => q.s))];

let currentUser = null;   // { uid, displayName, email, isAnon }
let saveTimer   = null;

let state = {
  section: 'All',
  answers:  {},
  revealed: {},
  history:  [],
  cursor:   0,
};
let filtered = ALL_QUESTIONS.slice();

// ── AUTH UI ────────────────────────────────────────────────────────
let authMode = 'signin';

function authTab(mode) {
  authMode = mode;
  document.getElementById('tabSignIn').classList.toggle('active', mode === 'signin');
  document.getElementById('tabSignUp').classList.toggle('active', mode === 'signup');
  document.getElementById('btnEmailAuth').textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
  document.getElementById('authPassword').autocomplete = mode === 'signin' ? 'current-password' : 'new-password';
  showAuthError('');
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

function setAuthLoading(loading) {
  document.querySelector('.auth-card').classList.toggle('auth-loading', loading);
}

async function handleEmailAuth() {
  const email = document.getElementById('authEmail').value;
  const password = document.getElementById('authPassword').value;

  const isSignUp = document.getElementById('tabSignUp').classList.contains('active');

  try {
    if (isSignUp) {
      await firebaseSignUpEmail(email, password);
    } else {
      await firebaseSignInEmail(email, password);
    }
  } catch (err) {
    showAuthError(err.message);
  }
}

async function handleGoogleAuth() {
  showAuthError(''); setAuthLoading(true);
  try {
    const result = await firebaseSignInGoogle();
    await onUserLoggedIn({
      uid: result.user.uid,
      displayName: result.user.displayName || 'User',
      email: result.user.email,
      isAnon: false
    });
  } catch (e) {
    showAuthError(friendlyAuthError(e));
  } finally {
    setAuthLoading(false);
  }
}

async function handleAnonymousAuth() {
  // Try Firebase anon auth — if not connected, just go local-only
  try {
    const result = await firebaseSignInAnonymous();
    await onUserLoggedIn({
      uid: result.user.uid,
      displayName: 'Guest',
      email: null,
      isAnon: true
    });
  } catch(_) {
    // Firebase not connected — guest local-only mode
    await onUserLoggedIn({ uid: null, displayName: 'Guest', email: null, isAnon: true });
  }
}

async function handleSignOut() {
  if (confirm('Sign out? Local progress will be cleared.')) {
    await firebaseSignOut();
    currentUser = null;
    state = { section:'All', answers:{}, revealed:{}, history:[], cursor:0 };
    filtered = ALL_QUESTIONS.slice();
    document.getElementById('appRoot').style.display = 'none';
    document.getElementById('authScreen').style.display = 'flex';
  }
}

function friendlyAuthError(e) {
  const code = e.code || '';
  if (code.includes('user-not-found') || code.includes('wrong-password')) return 'Invalid email or password.';
  if (code.includes('email-already-in-use')) return 'An account with this email already exists.';
  if (code.includes('weak-password')) return 'Password should be at least 6 characters.';
  if (code.includes('invalid-email')) return 'Please enter a valid email address.';
  if (code.includes('popup-closed')) return 'Sign-in popup was closed. Please try again.';
  return e.message || 'Something went wrong. Please try again.';
}

// ── ON LOGIN ───────────────────────────────────────────────────────
async function onUserLoggedIn(user) {
  currentUser = user;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appRoot').style.display = 'flex';

  // User pill
  const initials = (user.displayName || 'G').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userName').textContent = user.isAnon ? 'Guest' : (user.displayName || user.email);

  // Load saved progress
  if (user.uid && !user.isAnon) {
    setSaveDot('saving');
    const saved = await loadProgressFromFirebase(user.uid);
    if (saved) {
      state.answers  = saved.answers  || {};
      state.revealed = saved.revealed || {};
      state.history  = saved.history  || [];
      state.cursor   = saved.cursor   || 0;
    }
    setSaveDot('saved');
  }

  buildSidebar();
  renderQuestion();
  updateSidebarProgress();
     // Inside your <script> tag, add this to handle mobile menu
document.getElementById('mobileMenuBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    // Also toggle an overlay if you created one
});

// Close sidebar when a topic is clicked on mobile
function setSection(s, el) {
    state.section = s;
    state.cursor = 0;
    filtered = s === 'All' ? ALL_QUESTIONS.slice() : ALL_QUESTIONS.filter(q => q.s === s);
    
    // ADD THIS LINE
    if (window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
    
    document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
    renderQuestion();
}
}

// ── AUTO-SAVE ──────────────────────────────────────────────────────
function scheduleSave() {
  if (!currentUser || !currentUser.uid || currentUser.isAnon) return;
  setSaveDot('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await saveProgressToFirebase(currentUser.uid, {
      answers:  state.answers,
      revealed: state.revealed,
      history:  state.history.slice(0, 100),
      cursor:   state.cursor,
    });
    setSaveDot('saved');
  }, 1500); // debounce 1.5s
}

function setSaveDot(status) {
  const dot = document.getElementById('saveDot');
  dot.className = 'save-dot ' + status;
  if (status === 'saved') {
    dot.title = 'Progress saved';
    setTimeout(() => dot.className = 'save-dot', 3000);
  } else if (status === 'saving') {
    dot.title = 'Saving…';
  }
}

// ── SIDEBAR ───────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('topicList');
  list.innerHTML = '';
  SECTIONS.forEach(s => {
    const cnt = ALL_QUESTIONS.filter(q => q.s === s).length;
    const safeId = s.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'');
    const wrap = document.createElement('div');
    wrap.innerHTML = `
      <button class="topic-btn" data-section="${s}" onclick="setSection(this.dataset.section,this)">
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s}</span>
        <span class="topic-count" id="sc-${safeId}">${cnt}</span>
      </button>
      <div class="topic-progress"><div class="topic-progress-fill" id="tp-${safeId}" style="width:0%"></div></div>`;
    list.appendChild(wrap);
  });
}

function setSection(s, el) {
  state.section = s;
  state.cursor  = 0;
  filtered = s === 'All' ? ALL_QUESTIONS.slice() : ALL_QUESTIONS.filter(q => q.s === s);
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderQuestion();
}

// ── QUIZ ──────────────────────────────────────────────────────────
function renderQuestion() {
  if (!filtered.length) return;
  const q = filtered[state.cursor];
  const ans = state.answers[q.id];
  const rev = state.revealed[q.id];
  const locked = !!(ans || rev);

  document.getElementById('qTopicTag').textContent = q.s;
  document.getElementById('qCur').textContent = state.cursor + 1;
  document.getElementById('qTotal').textContent = filtered.length;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qProgressFill').style.width = ((state.cursor+1)/filtered.length*100) + '%';

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.o.forEach(([ltr, txt]) => {
    const div = document.createElement('div');
    let cls = 'option';
    if (locked) {
      cls += ' locked';
      if (ltr === q.c)          cls += ' correct';
      else if (ans && ltr === ans.selected) cls += ' wrong';
      else                       cls += ' dimmed';
    }
    div.className = cls;
    div.innerHTML = `<span class="opt-letter">${ltr})</span><span>${txt}</span>`;
    if (!locked && q.c) div.onclick = () => selectAnswer(q.id, ltr);
    container.appendChild(div);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
  if (ans) {
    if (ans.correct) { fb.className='feedback correct-fb show'; fb.textContent='✓ Correct!'; }
    else             { fb.className='feedback wrong-fb show';   fb.textContent=`✗ Wrong — correct: ${q.c})`; }
  } else if (rev) {
    fb.className='feedback reveal-fb show'; fb.textContent=`Answer revealed: ${q.c})`;
  }

  document.getElementById('btnPrev').disabled = state.cursor === 0;
  document.getElementById('btnReveal').style.display = (locked || !q.c) ? 'none' : '';
  document.getElementById('btnNext').textContent = state.cursor === filtered.length-1 ? 'Finish ✓' : 'Next →';
}

function selectAnswer(id, letter) {
  const q = ALL_QUESTIONS.find(x => x.id === id);
  if (!q || !q.c) return;
  const correct = letter === q.c;
  state.answers[id] = { selected: letter, correct, ts: Date.now() };
  state.history.unshift({ id, correct, ts: Date.now() });
  if (state.history.length > 100) state.history.pop();
  updateSidebarProgress();
  scheduleSave();   // 🔥 triggers Firebase save
  renderQuestion();
}

function reveal() {
  const q = filtered[state.cursor];
  if (!q || !q.c) return;
  state.revealed[q.id] = true;
  scheduleSave();   // 🔥 triggers Firebase save
  renderQuestion();
}

function go(dir) {
  const n = state.cursor + dir;
  if (n < 0 || n >= filtered.length) return;
  state.cursor = n;
  scheduleSave();
  renderQuestion();
  document.getElementById('quizView').scrollTop = 0;
}

function jumpTo() {
  const v = parseInt(document.getElementById('jumpInput').value);
  if (!isNaN(v) && v >= 1 && v <= filtered.length) {
    state.cursor = v - 1;
    renderQuestion();
    document.getElementById('jumpInput').value = '';
  }
}

function updateSidebarProgress() {
  SECTIONS.forEach(s => {
    const topicQs = ALL_QUESTIONS.filter(q => q.s === s);
    const done = topicQs.filter(q => state.answers[q.id] || state.revealed[q.id]).length;
    const pct  = topicQs.length > 0 ? done / topicQs.length * 100 : 0;
    const safeId = s.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'');
    const el = document.getElementById('tp-' + safeId);
    if (el) el.style.width = pct + '%';
  });
}

// ── TAB ───────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tabQuiz').classList.toggle('active', tab==='quiz');
  document.getElementById('tabStats').classList.toggle('active', tab==='stats');
  document.getElementById('quizView').style.display  = tab==='quiz' ? '' : 'none';
  document.getElementById('statsView').style.display = tab==='stats' ? 'block' : 'none';
  if (tab==='stats') renderStats();
}

// ── STATS ─────────────────────────────────────────────────────────
function renderStats() {
  const answered     = Object.values(state.answers);
  const totalAnswered= answered.length;
  const totalCorrect = answered.filter(a => a.correct).length;
  const totalWrong   = totalAnswered - totalCorrect;
  const totalRevealed= Object.keys(state.revealed).length;
  const pct = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100) : 0;

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card c1"><div class="val">${ALL_QUESTIONS.length}</div><div class="lbl">Total</div></div>
    <div class="stat-card c5"><div class="val">${totalAnswered}</div><div class="lbl">Attempted</div></div>
    <div class="stat-card c2"><div class="val">${totalCorrect}</div><div class="lbl">Correct</div></div>
    <div class="stat-card c3"><div class="val">${totalWrong}</div><div class="lbl">Wrong</div></div>
    <div class="stat-card c4"><div class="val">${pct}%</div><div class="lbl">Score</div></div>`;

  document.getElementById('ringArc').setAttribute('stroke-dashoffset', 314 - (314*pct/100));
  document.getElementById('ringPct').textContent = pct + '%';

  let streak=0, maxStreak=0, cur=0;
  state.history.slice().reverse().forEach(h => { if(h.correct){cur++;maxStreak=Math.max(maxStreak,cur);}else cur=0; });
  for (let h of state.history) { if(h.correct) streak++; else break; }

  document.getElementById('streakPanel').innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;height:100%;display:flex;flex-direction:column;gap:14px;">
      <h3 style="font-family:'Syne',sans-serif;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Streaks & Pace</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="background:var(--surface2);border-radius:9px;padding:14px;text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--gold)">${streak}</div>
          <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em">Current Streak</div>
        </div>
        <div style="background:var(--surface2);border-radius:9px;padding:14px;text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--accent2)">${maxStreak}</div>
          <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em">Best Streak</div>
        </div>
        <div style="background:var(--surface2);border-radius:9px;padding:14px;text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:#7c83ff">${totalRevealed}</div>
          <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em">Revealed</div>
        </div>
        <div style="background:var(--surface2);border-radius:9px;padding:14px;text-align:center;">
          <div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--muted)">${ALL_QUESTIONS.length - totalAnswered - totalRevealed}</div>
          <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em">Remaining</div>
        </div>
      </div>
    </div>`;

  let rows = '';
  SECTIONS.forEach(s => {
    const topicQs = ALL_QUESTIONS.filter(q => q.s === s);
    const tot = topicQs.length;
    const ans = topicQs.filter(q => state.answers[q.id]);
    const cor = ans.filter(a => state.answers[a.id].correct).length;
    const wrg = ans.length - cor;
    const sc  = ans.length > 0 ? Math.round(cor/ans.length*100) : null;
    const prog= Math.round((ans.length + topicQs.filter(q=>state.revealed[q.id]).length)/tot*100);
    const color = sc===null ? '#6b7492' : sc>=70 ? '#1db96a' : sc>=50 ? '#f39c12' : '#e74c3c';
    rows += `<div class="topic-row">
      <span style="font-size:0.82rem">${s}</span>
      <span style="color:var(--muted)">${tot}</span>
      <span class="badge-correct">${cor}</span>
      <span class="badge-wrong">${wrg}</span>
      <span style="color:${color};font-weight:600">${sc!==null?sc+'%':'—'}</span>
      <div class="bar-cell"><div class="mini-bar"><div class="mini-bar-fill" style="width:${prog}%;background:${color}"></div></div><span class="pct-val">${prog}%</span></div>
    </div>`;
  });
  document.getElementById('topicTableBody').innerHTML = rows;

  const recent20 = state.history.slice(0,20);
  document.getElementById('activityLog').innerHTML = recent20.length === 0
    ? '<div style="padding:20px;color:var(--muted);font-size:0.84rem;text-align:center">No answers yet — start the quiz!</div>'
    : recent20.map(h => {
        const q = ALL_QUESTIONS.find(x => x.id === h.id);
        if (!q) return '';
        return `<div class="activity-item">
          <div class="act-dot ${h.correct?'c':'w'}"></div>
          <div><div class="act-q">${q.q.slice(0,80)}${q.q.length>80?'…':''}</div><div class="act-sec">${q.s}</div></div>
          <span class="act-result" style="color:${h.correct?'var(--correct)':'var(--wrong)'}">${h.correct?'✓':'✗'}</span>
        </div>`;
      }).join('');
}

function resetAll() {
  if (!confirm('Reset all answers and progress?')) return;
  state.answers = {}; state.revealed = {}; state.history = [];
  scheduleSave();
  updateSidebarProgress();
  renderStats();
  renderQuestion();
}
</script>
</body>
</html>
